name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Lint Python files
      run: |
        python -m compileall src
        echo "✓ No hay errores de sintaxis"
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing
    
    - name: Validate JSON schemas
      run: |
        python -c "
        import json
        schemas = ['bronze_schema.json', 'silver_schema.json', 'gold_schema.json']
        for schema in schemas:
            with open(f'data_contracts/schemas/{schema}') as f:
                json.load(f)
            print(f'✓ {schema} es válido')
        "
    
    - name: Check imports
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        from pipeline.extract import dwspotify, llamar_api
        from pipeline.transform import crear_bronze, limpiar_datos, agregar_metricas
        from pipeline.load import guardar_bronze, guardar_silver, guardar_gold
        from utils.validador import validar_datos
        print('✓ Todos los imports funcionan')
        "
    
    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: .coverage
